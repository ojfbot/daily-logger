<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="baseurl" content="{{ site.baseurl }}">
  <title>Decisions — {{ site.title }}</title>
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/dashboard.css">
</head>
<body>
  <header class="site-header">
    <a class="site-title" href="{{ site.baseurl }}/">ojfbot/dev-log</a>
    <nav class="site-nav">
      <a href="{{ site.baseurl }}/">Index</a>
      <a href="{{ site.baseurl }}/decisions-log/" class="active">Decisions</a>
      <a href="{{ site.baseurl }}/actions/">Actions</a>
      <button class="theme-toggle">DARK</button>
    </nav>
  </header>

  <div class="container">
    <div class="article-header">
      <h1 class="article-title">Decisions</h1>
      <p class="entry-summary">Architectural decisions extracted from daily articles.</p>
    </div>

    <div class="filter-bar" id="decisions-filter">
      <span class="filter-label">FILTER</span>
    </div>

    <table class="decisions-table" id="decisions-table">
      <thead>
        <tr>
          <th data-sort="date">DATE</th>
          <th data-sort="repo">REPO</th>
          <th data-sort="title">DECISION</th>
          <th>PILLAR</th>
        </tr>
      </thead>
      <tbody id="decisions-body">
        <tr><td colspan="4" style="text-align:center;color:var(--text-secondary)">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <footer class="site-footer">
    <a href="https://github.com/ojfbot/daily-logger">ojfbot/daily-logger</a> — self-documenting development system
  </footer>

  <script type="module">
    import { getEntries } from '{{ site.baseurl }}/assets/js/data.js'
    import { initTheme } from '{{ site.baseurl }}/assets/js/theme.js'

    const BASE = '{{ site.baseurl }}'

    document.addEventListener('DOMContentLoaded', async () => {
      initTheme()

      const entries = await getEntries()
      const tbody = document.getElementById('decisions-body')
      const rows = []

      for (const entry of entries) {
        for (const dec of (entry.decisions ?? [])) {
          rows.push({ date: entry.date, ...dec })
        }
      }

      if (rows.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="empty-state">No decisions extracted yet.</td></tr>'
        return
      }

      function render(data) {
        tbody.innerHTML = data.map(r => `
          <tr>
            <td><a href="${BASE}/articles/${r.date}/">${r.date}</a></td>
            <td>${r.repo}</td>
            <td><strong>${r.title}</strong>${r.summary ? '<br><span style="color:var(--text-secondary);font-size:0.75rem">' + r.summary + '</span>' : ''}</td>
            <td>${r.pillar ? '<span class="pillar-badge">' + r.pillar + '</span>' : ''}</td>
          </tr>
        `).join('')
      }

      render(rows)

      // Sort
      let sortKey = 'date'
      let sortAsc = false
      document.querySelectorAll('.decisions-table th[data-sort]').forEach(th => {
        th.addEventListener('click', () => {
          const key = th.dataset.sort
          if (sortKey === key) sortAsc = !sortAsc
          else { sortKey = key; sortAsc = true }
          rows.sort((a, b) => {
            const va = a[key] ?? ''
            const vb = b[key] ?? ''
            return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va)
          })
          render(rows)
        })
      })
    })
  </script>
</body>
</html>
