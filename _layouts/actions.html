<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="baseurl" content="{{ site.baseurl }}">
  <title>Actions — {{ site.title }}</title>
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/dashboard.css">
</head>
<body>
  <header class="site-header">
    <a class="site-title" href="{{ site.baseurl }}/">ojfbot/dev-log</a>
    <nav class="site-nav">
      <a href="{{ site.baseurl }}/">Index</a>
      <a href="{{ site.baseurl }}/decisions-log/">Decisions</a>
      <a href="{{ site.baseurl }}/actions/" class="active">Actions</a>
      <button class="theme-toggle">DARK</button>
    </nav>
  </header>

  <div class="container">
    <div class="article-header">
      <h1 class="article-title">Actions</h1>
      <p class="entry-summary">Suggested action items extracted from daily articles.</p>
    </div>

    <div class="filter-bar" id="actions-filter">
      <span class="filter-label">FILTER</span>
    </div>

    <div class="actions-columns" id="actions-columns">
      <div class="actions-column">
        <div class="actions-column-header">OPEN</div>
        <div id="actions-open">Loading...</div>
      </div>
      <div class="actions-column">
        <div class="actions-column-header">STALE (&gt;14 DAYS)</div>
        <div id="actions-stale"></div>
      </div>
      <div class="actions-column">
        <div class="actions-column-header">DONE</div>
        <div id="actions-done"></div>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <a href="https://github.com/ojfbot/daily-logger">ojfbot/daily-logger</a> — self-documenting development system
  </footer>

  <script type="module">
    import { getActions, getDoneActions } from '{{ site.baseurl }}/assets/js/data.js'
    import { initTheme } from '{{ site.baseurl }}/assets/js/theme.js'

    const BASE = '{{ site.baseurl }}'
    const STALE_DAYS = 14

    function actionHash(a) {
      return `${a.sourceDate}:${a.command}:${a.repo}:${a.description.slice(0, 50)}`
    }

    function renderAction(a, extraClass = '') {
      return `
        <div class="action-item ${extraClass}">
          <span class="action-command">${a.command}</span>
          <span>${a.description} <span class="entry-stat">(${a.repo}, ${a.sourceDate})</span></span>
        </div>
      `
    }

    document.addEventListener('DOMContentLoaded', async () => {
      initTheme()

      const [actions, doneHashes] = await Promise.all([getActions(), getDoneActions()])
      const doneSet = new Set(doneHashes)

      const now = new Date()
      const open = []
      const stale = []
      const done = []

      for (const a of actions) {
        const hash = actionHash(a)
        if (doneSet.has(hash)) {
          done.push(a)
          continue
        }
        const age = Math.floor((now - new Date(a.sourceDate + 'T12:00:00Z')) / (1000 * 60 * 60 * 24))
        if (age > STALE_DAYS) {
          stale.push(a)
        } else {
          open.push(a)
        }
      }

      document.getElementById('actions-open').innerHTML =
        open.length > 0 ? open.map(a => renderAction(a)).join('') : '<div class="empty-state">No open actions</div>'

      document.getElementById('actions-stale').innerHTML =
        stale.length > 0 ? stale.map(a => renderAction(a, 'action-stale')).join('') : '<div class="empty-state">No stale actions</div>'

      document.getElementById('actions-done').innerHTML =
        done.length > 0 ? done.map(a => renderAction(a, 'action-done')).join('') : '<div class="empty-state">No completed actions</div>'

      // Filter bar
      const filterEl = document.getElementById('actions-filter')
      const commands = [...new Set(actions.map(a => a.command))].sort()
      for (const cmd of commands) {
        const chip = document.createElement('span')
        chip.className = 'tag'
        chip.dataset.type = 'practice'
        chip.textContent = cmd
        chip.style.cursor = 'pointer'
        chip.addEventListener('click', () => {
          chip.classList.toggle('active')
          applyFilter()
        })
        filterEl.appendChild(chip)
      }

      function applyFilter() {
        const activeCommands = [...filterEl.querySelectorAll('.tag.active')].map(el => el.textContent)
        const items = document.querySelectorAll('.action-item')
        for (const item of items) {
          const cmd = item.querySelector('.action-command')?.textContent
          item.style.display = activeCommands.length === 0 || activeCommands.includes(cmd) ? '' : 'none'
        }
      }
    })
  </script>
</body>
</html>
