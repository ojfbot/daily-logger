name: PR Check

# Validates every PR to main:
#   1. Symlink safety check — all tracked symlinks must be excluded from Jekyll
#   2. Unit tests
#   3. Pipeline smoke test (MOCK_LLM=true — no Anthropic API call, no GH_PAT required)
#   4. PR body builder script
#
# WHY the symlink check matters: this repo uses git-tracked symlinks to
# cross-reference sibling repos (e.g. decisions/core → ../../core/decisions).
# Jekyll 3.x calls realpath() on every file it encounters; if a symlink's target
# doesn't exist in CI (because the sibling repo isn't checked out), Jekyll throws
# Errno::ENOENT and the deploy-pages workflow fails. Adding the symlink's path to
# _config.yml's exclude: list is the fix; this step ensures it's never forgotten.
#
# The smoke test exercises the full generate → council → synthesize → write path
# using a fixture StructuredArticle instead of a real LLM response. This catches
# structural regressions (tool_use parsing, assembleBody, toMarkdown) without
# burning API credits or requiring secrets.

on:
  pull_request:
    branches: [main]

jobs:
  check:
    name: Test + pipeline smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Symlink safety check
        # Finds every symlink committed to git and verifies it (or its parent
        # directory) is listed in _config.yml's exclude: block.
        # Prevents Errno::ENOENT in jekyll-build-pages when a symlink points
        # to a sibling repo that isn't checked out in CI.
        # Runs before install so it fails fast with no setup cost.
        run: |
          # List all symlinks tracked by git (mode 120000)
          SYMLINKS=$(git ls-files -s | awk '$1 == "120000" {print $4}')

          if [ -z "$SYMLINKS" ]; then
            echo "✓ No tracked symlinks found"
            exit 0
          fi

          echo "Tracked symlinks:"
          echo "$SYMLINKS" | sed 's/^/  /'

          MISSING=()
          while IFS= read -r link; do
            # Walk up the directory tree: a symlink is safe if it OR any of
            # its ancestor directories appears in _config.yml's exclude list.
            # e.g. .claude/commands/adr passes because .claude/ is excluded.
            path="$link"
            excluded=false
            while [[ "$path" != "." && "$path" != "/" && "$path" != "" ]]; do
              if grep -qE "^\s*-\s+['\"]?${path}/?['\"]?" _config.yml; then
                excluded=true
                break
              fi
              path=$(dirname "$path")
            done
            if [[ "$excluded" == "false" ]]; then
              MISSING+=("$link")
            fi
          done <<< "$SYMLINKS"

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo ""
            echo "❌ The following symlinks are NOT excluded from the Jekyll build:"
            printf "   %s\n" "${MISSING[@]}"
            echo ""
            echo "Add each symlink path (or its parent directory) to the exclude:"
            echo "block in _config.yml to prevent Errno::ENOENT in deploy-pages."
            exit 1
          fi

          echo "✓ All tracked symlinks are excluded from Jekyll build"

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      - name: Build frontend
        run: pnpm build:frontend

      - name: Unit tests
        run: pnpm test

      - name: Pipeline smoke test (mock LLM — no API call)
        env:
          # MOCK_LLM=true: generateArticle() and council calls return fixtures.
          # The Anthropic SDK constructor requires a key string but never calls
          # the API in mock mode — this placeholder satisfies the env check.
          ANTHROPIC_API_KEY: sk-ant-mock-smoke-test
          # GITHUB_TOKEN has read access to public repos for the collect phase.
          # Private repos return empty arrays (ghApi silently skips 404s).
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OJFBOT_ORG: ojfbot
          MOCK_LLM: "true"
          # Fixed date so the output file is predictable for the PR body check below.
          DATE_OVERRIDE: "2026-01-01"
          DRY_RUN: "false"
        run: pnpm generate

      - name: Verify article was written
        run: |
          if [ ! -f "_articles/2026-01-01.md" ]; then
            echo "❌ _articles/2026-01-01.md was not created by the smoke test"
            exit 1
          fi
          echo "✓ Article file exists"
          # Verify required sections are present
          for section in "## What shipped" "## The decisions" "## Roadmap pulse" "## What's next" "Suggested actions"; do
            if ! grep -q "${section}" _articles/2026-01-01.md; then
              echo "❌ Missing section: ${section}"
              exit 1
            fi
          done
          echo "✓ All required sections and blockquotes present"

      - name: Build and verify static JSON API
        run: |
          pnpm build:api
          for f in api/entries.json api/actions.json api/tags.json api/repos.json; do
            if [ ! -f "$f" ]; then
              echo "❌ $f was not created"
              exit 1
            fi
            # Validate JSON syntax
            node -e "JSON.parse(require('fs').readFileSync('$f','utf-8'))"
            echo "✓ $f is valid JSON"
          done

      - name: PR body builder check
        run: |
          python3 .github/scripts/build_pr_body.py \
            "2026-01-01" "article/2026-01-01" "_articles/2026-01-01.md" \
            > /tmp/pr-body.md
          # Verify the output contains expected structural elements
          if ! grep -q "Daily article" /tmp/pr-body.md; then
            echo "❌ PR body builder output missing expected content"
            cat /tmp/pr-body.md
            exit 1
          fi
          echo "✓ PR body builder produced valid output"
          echo "--- PR body preview ---"
          head -20 /tmp/pr-body.md
